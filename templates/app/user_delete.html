{% extends 'app/base.html' %}

{% block content %}
    <h2>Delete User</h2>
    <p>Are you sure you want to delete "{{ botlar.ism }} {{ botlar.familiya }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
